<!-- @dsCard group="Components" viewport="700x320" name="Core — Button · Badge · Chip" subtitle="Buttons, pill badges, selectable chips" -->
<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg-app);padding:22px}
  .grid{display:flex;flex-direction:column;gap:18px}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .lbl{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--text-caption);margin-bottom:8px}
</style></head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Button, Badge, Chip } = window.MungMateDesignSystem_181714;
    function Demo() {
      const [sel, setSel] = React.useState('energy');
      return (
        <div className="grid">
          <div>
            <div className="lbl">Button</div>
            <div className="row">
              <Button variant="gradient">진단 시작하기</Button>
              <Button variant="primary">매칭 보기</Button>
              <Button variant="secondary">다시</Button>
              <Button variant="ghost">건너뛰기</Button>
              <Button variant="primary" disabled>비활성</Button>
            </div>
          </div>
          <div>
            <div className="lbl">Badge</div>
            <div className="row">
              <Badge tone="gold" solid>한국 인기 29위</Badge>
              <Badge tone="hope">훈련 가능</Badge>
              <Badge tone="good">털 빠짐 적음</Badge>
              <Badge tone="info">AI 훈련</Badge>
              <Badge tone="brand" solid>착한개 인증</Badge>
            </div>
          </div>
          <div>
            <div className="lbl">Chip</div>
            <div className="row">
              {[['energy','활동량 많음'],['quiet','조용함'],['family','가족견'],['small','소형견']].map(([k,t])=>(
                <Chip key={k} selected={sel===k} onClick={()=>setSel(k)}>{t}</Chip>
              ))}
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  </script>
</body></html>
