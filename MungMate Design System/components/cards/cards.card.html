  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
  .stack{display:flex;flex-direction:column;gap:10px}

<body>
  <div id="root"></div>

  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Card, TraitCard, TraitMeter, Badge } = window.MungMateDesignSystem_181714;
    function Demo() {
      return (
        <div className="grid">
          <div>
            <div className="lbl">TraitCard</div>
            <div className="stack">
              <TraitCard tone="hope" title="원래 잘 짖지만, 훈련으로 컨트롤 가능해요"
                text="타고난 경계심으로 짖음이 많지만, 학습 의지가 강해 꾸준한 훈련으로 컨트롤할 수 있어요." />
              <TraitCard tone="good" title="털 빠짐이 적은 견종이에요"
                text="옷·가구에 털이 잘 안 묻어요." />
            </div>
          </div>
          <div>
            <div className="lbl">Card · TraitMeter</div>
            <Card>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
                <strong style={{fontSize:18,fontWeight:900,color:'var(--ink-900)'}}>셔틀랜드 쉽독</strong>
                <Badge tone="gold" solid>인기 29위</Badge>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:11}}>
                <TraitMeter label="짖음" score={5} scaleWord="매우 높음" tone="hope" />

                <TraitMeter label="활동량" score={4} scaleWord="높음" tone="hope" />
                <TraitMeter label="털 빠짐" score={3} scaleWord="보통" />
              </div>
            </Card>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  </script>
