<!-- @dsCard group="Colors" viewport="700x160" name="Accent & bridge" subtitle="Electric Blue (IT signal) + Lavender Mist (warm↔cool bridge)" -->
<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg-app);padding:20px}
  .row{display:flex;gap:10px}
  .sw{flex:1;border-radius:var(--radius-lg);padding:12px 14px;display:flex;flex-direction:column;justify-content:flex-end;height:88px;border:1px solid #00000010}
  .sw b{font-weight:800;font-size:12.5px}
  .sw span{font-size:10.5px;opacity:.8;font-family:var(--font-mono)}
  .grad{flex:1.4;border-radius:var(--radius-lg);height:88px;display:flex;align-items:flex-end;padding:12px;color:#fff;font-weight:800;font-size:12px}
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--blue-500);color:#fff"><b>blue-500 · accent</b><span>#0BB4F0</span></div>
    <div class="sw" style="background:var(--blue-tint);color:var(--info-fg)"><b>blue-tint</b><span>#E6F7FD</span></div>
    <div class="sw" style="background:var(--lavender-500);color:#fff"><b>lavender · bridge</b><span>#A57BD9</span></div>
    <div class="sw" style="background:var(--lavender-tint);color:var(--lavender-600)"><b>lavender-tint</b><span>#F5EFFB</span></div>
    <div class="grad" style="background:var(--spectrum-gradient)">warm → cool</div>
  </div>
</body></html>
