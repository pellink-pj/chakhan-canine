<!-- @dsCard group="Brand" viewport="700x150" name="Signature gradient" subtitle="Coral → sunset, 135° · plus the warm→cool spectrum" -->
<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg-app);padding:20px 24px;display:flex;gap:16px;align-items:stretch}
  .grad{flex:2;border-radius:var(--radius-xl);background:var(--brand-gradient);display:flex;align-items:flex-end;padding:14px;color:#fff;box-shadow:var(--shadow-brand)}
  .grad b{font-weight:800;font-size:14px}
  .grad span{font-family:var(--font-mono);font-size:11px;opacity:.85;display:block;margin-top:2px}
  .soft{flex:1;border-radius:var(--radius-xl);background:var(--brand-gradient-soft);border:1px solid var(--border-card);display:flex;align-items:flex-end;padding:14px;color:var(--text-muted)}
  .soft b{font-weight:800;font-size:13px;color:var(--ink-900)}
  .soft span{font-family:var(--font-mono);font-size:10px;display:block;margin-top:2px}
</style></head>
<body>
  <div class="grad"><div><b>--brand-gradient</b><span>coral → orange → sunset, 135°</span></div></div>
  <div class="grad" style="background:var(--spectrum-gradient)"><div><b>--spectrum-gradient</b><span>coral → lavender → blue</span></div></div>
  <div class="soft"><div><b>--brand-gradient-soft</b><span>cream → white</span></div></div>
</body></html>
