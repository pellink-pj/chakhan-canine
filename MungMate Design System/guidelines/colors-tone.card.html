<!-- @dsCard group="Colors" viewport="700x210" name="Tone trio" subtitle="good · hope · caution — the heart of the brand voice" -->
<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg-app);padding:20px}
  .row{display:flex;gap:12px}
  .tone{flex:1;border-radius:var(--radius-xl);padding:14px 16px;border:1px solid var(--border-card);border-left:4px solid}
  .tone .lab{font-weight:800;font-size:14px;display:flex;align-items:center;gap:6px}
  .tone .ko{font-size:11px;color:var(--text-muted);margin-top:2px}
  .tone .ex{font-size:12px;color:var(--text-body);margin-top:9px;line-height:1.45}
  .good{background:var(--good-tint);border-left-color:var(--good-line)}
  .good .lab{color:var(--good-fg)}
  .hope{background:var(--hope-tint);border-left-color:var(--hope-line)}
  .hope .lab{color:var(--hope-fg)}
  .caution{background:var(--caution-tint);border-left-color:var(--caution-line)}
  .caution .lab{color:var(--caution-fg)}
</style></head>
<body>
  <div class="row">
    <div class="tone good"><div class="lab">good</div><div class="ko">그대로도 좋은 특성</div><div class="ex">털 빠짐이 적은 견종이에요.</div></div>
    <div class="tone hope"><div class="lab">hope</div><div class="ko">훈련으로 극복 가능</div><div class="ex">원래 잘 짖지만, 훈련으로 컨트롤 가능해요.</div></div>
    <div class="tone caution"><div class="lab">caution</div><div class="ko">신중히 고려</div><div class="ex">어린 자녀가 있으면 신중히 고려해주세요.</div></div>
  </div>
</body></html>
