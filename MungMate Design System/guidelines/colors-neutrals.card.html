<!-- @dsCard group="Colors" viewport="700x160" name="Neutrals & ground" subtitle="Plum-tinted ink + soft mint surfaces — easy on the eyes" -->
<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg-app);padding:20px}
  .row{display:flex;gap:8px}
  .sw{flex:1;border-radius:var(--radius-md);height:78px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;border:1px solid #00000010}
  .sw b{font-weight:700;font-size:11px}
  .sw span{font-size:10px;opacity:.7;font-family:var(--font-mono)}
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--ink-900);color:#fff"><b>ink-900 plum</b><span>#2D1E33</span></div>
    <div class="sw" style="background:var(--ink-700);color:#fff"><b>ink-700</b><span>#574860</span></div>
    <div class="sw" style="background:var(--ink-600);color:#fff"><b>ink-600</b><span>#6E6275</span></div>
    <div class="sw" style="background:var(--ink-400);color:#fff"><b>ink-400</b><span>#9C92A0</span></div>
    <div class="sw" style="background:var(--mint-200);color:var(--ink-700)"><b>mint-200</b><span>#DCEDE5</span></div>
    <div class="sw" style="background:var(--mint-100);color:var(--ink-700)"><b>mint-100 bg</b><span>#ECF6F1</span></div>
    <div class="sw" style="background:var(--white);color:var(--ink-700)"><b>white card</b><span>#FFFFFF</span></div>
  </div>
</body></html>
