<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg-app);padding:22px 24px;color:var(--text-strong)}
  .stat{font-weight:900;font-size:var(--text-hero);letter-spacing:var(--tracking-tight);line-height:1;color:var(--brand)}
  .disp{font-weight:800;font-size:var(--text-display);letter-spacing:var(--tracking-tight);line-height:1.1;margin-top:6px}
  .h2{font-weight:800;font-size:var(--text-h2);letter-spacing:var(--tracking-snug);margin-top:10px}
  .meta{font-size:11px;color:var(--text-caption);font-family:var(--font-mono);margin-top:2px}
</style></head>
<body>
  <div class="stat">11만 마리</div>
  <div class="meta">hero stat · 900 · 64px · -0.03em</div>
  <div class="disp">당신, 정말 준비됐나요?</div>
  <div class="meta">display · 800 · 44px</div>
  <div class="h2">원래 잘 짖지만, 훈련으로 컨트롤 가능해요</div>
  <div class="meta">h2 · 800 · 24px</div>
</body></html>
