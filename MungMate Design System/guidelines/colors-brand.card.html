<!-- @dsCard group="Colors" viewport="700x190" name="Brand core" subtitle="Coral Pink leads · Sunset Yellow brings energy" -->
<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg-app);padding:20px}
  .row{display:flex;gap:10px}
  .sw{flex:1;border-radius:var(--radius-lg);padding:12px 14px;display:flex;flex-direction:column;justify-content:flex-end;height:104px;border:1px solid #00000010}
  .sw b{font-weight:800;font-size:13px}
  .sw span{font-size:11px;opacity:.78;font-family:var(--font-mono)}
  .on-dark{color:#fff}
  .on-light{color:var(--ink-900)}
</style></head>
<body>
  <div class="row">
    <div class="sw on-dark" style="background:var(--coral-700)"><b>coral-700</b><span>#D63E50</span></div>
    <div class="sw on-dark" style="background:var(--coral-600)"><b>coral-600 ·</b><span>#F25D6C primary</span></div>
    <div class="sw on-light" style="background:var(--yellow-400)"><b>sunset-400</b><span>#F5BE3D</span></div>
    <div class="sw on-light" style="background:var(--coral-100)"><b>coral-100</b><span>#FCE0E3</span></div>
    <div class="sw on-light" style="background:var(--yellow-tint)"><b>sunset-tint</b><span>#FFF8E6</span></div>
  </div>
</body></html>
