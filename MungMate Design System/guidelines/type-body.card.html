<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg-app);padding:22px 24px}

  .body{font-weight:400;font-size:var(--text-base);color:var(--text-body);line-height:var(--lh-body);margin-top:8px;max-width:560px}
